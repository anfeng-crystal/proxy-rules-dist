[filter_remote]
# 直接复用本仓库生成的 snippets/quanx-filter-remote.conf。
# 如果后续需要更新规则源，请沿用 dist/base-url 产物，不要在这里硬编码私人订阅。

[filter_local]
# 排序模板：
# 1. LocalNetwork / ConnectivityCheck / 内网例外
# 2. AI / GitHub / 开发 / Payment / Apple / Apple更新 / Microsoft / Google / Telegram
# 3. YouTube / Netflix / Disney+ / GlobalMedia / 境外服务 / 海外网站
# 4. 国内流媒体 / 大陆网站
# 5. 广告
# 6. 游戏
# 7. FINAL 只能放最后
FINAL,PROXY
