# RuleForge 新版 QuanX 策略组模板。
# 说明：
# - 这是给人工审核和后续生成器用的完整模板，不改动现有主配置。
# - [server_remote]、HTTP 请求、证书、MITM、TLS 继续沿用你现有的主文件，这里只留占位。
# - [filter_remote] 直接复用本仓库生成的 snippets/quanx-filter-remote.conf，不在这里再内联一份远程分流。
# - 规则顺序按“先本地例外 / 内网 -> 细分服务 -> 家族桶 -> 国内 -> 广告拦截 -> 大桶 -> FINAL”。
# - DIRECT / REJECT 为内置策略名，不在这里重复定义；PROXY 作为显式兜底代理组保留。
# - 下列地区正则会用于 server-tag-regex，从订阅里的真实节点自动筛选地区池。
#
# 香港: (?:香港|港澳|港区|Hong ?Kong|HongKong|HKG|HK|🇭🇰|港服|港线|HK[ -]?(?:1|2|3|CN2|GIA|CUP|Lite|Pro|Premium)?)
# 台湾: (?:台湾|臺灣|台灣|Taiwan|TW|TPE|Taipei|台北|🇹🇼|Formosa)
# 日本: (?:日本|Japan|JP|Tokyo|東京|大阪|Osaka|TYO|NRT|HND|🇯🇵)
# 新加坡: (?:新加坡|Singapore|SG|SIN|SGP|狮城|獅城|星洲|🇸🇬)
# 美国: (?:美国|美國|USA|US|United ?States|America|🇺🇸|LAX|SFO|SEA|NYC|JFK|ORD|DFW|ATL|SJC|San ?Jose|Los ?Angeles|New ?York)
# 其他地区: ^(?!.*(?:香港|港澳|港区|Hong ?Kong|HongKong|HKG|HK|🇭🇰|台湾|臺灣|台灣|Taiwan|TW|TPE|Taipei|台北|🇹🇼|日本|Japan|JP|Tokyo|東京|大阪|Osaka|TYO|NRT|HND|🇯🇵|新加坡|Singapore|SG|SIN|SGP|狮城|獅城|星洲|🇸🇬|美国|美國|USA|US|United ?States|America|🇺🇸|LAX|SFO|SEA|NYC|JFK|ORD|DFW|ATL|SJC|San ?Jose|Los ?Angeles|New ?York)).*$

[server_remote]
# 占位：这里仅保留你自己的机场订阅 / 远程节点入口。
# 不写真实 URL；如需节点来源，请沿用现有 server_remote 层或生成器。

[policy]
static=节点选择, 香港手动, 台湾手动, 日本手动, 新加坡手动, 美国手动, 其他地区手动, DIRECT, img-url=https://anfeng-crystal.github.io/proxy-rules-dist/icons/airport.svg
static=自动选择, 香港自动, 台湾自动, 日本自动, 新加坡自动, 美国自动, 其他地区自动, DIRECT, img-url=https://anfeng-crystal.github.io/proxy-rules-dist/icons/server.svg
static=PROXY, 节点选择, 自动选择, DIRECT, img-url=https://anfeng-crystal.github.io/proxy-rules-dist/icons/proxy.svg

static=香港手动, DIRECT, server-tag-regex=(?:香港|港澳|港区|Hong ?Kong|HongKong|HKG|HK|🇭🇰|港服|港线|HK[ -]?(?:1|2|3|CN2|GIA|CUP|Lite|Pro|Premium)?), img-url=https://anfeng-crystal.github.io/proxy-rules-dist/icons/node.svg
