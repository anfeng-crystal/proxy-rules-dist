static=美国手动, DIRECT, server-tag-regex=(?:美国|美國|USA|US|United ?States|America|🇺🇸|LAX|SFO|SEA|NYC|JFK|ORD|DFW|ATL|SJC|San ?Jose|Los ?Angeles|New ?York), img-url=https://anfeng-crystal.github.io/proxy-rules-dist/icons/node.svg
