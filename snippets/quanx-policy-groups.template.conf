# RuleForge 多策略组模板。把 节点A/节点B/节点C 替换成你的真实节点或已有策略组。
# 建议顺序：LocalNetwork/DirectAll/DomesticAll 放在代理类规则之前，RejectAll 放在业务白名单之后。
[policy]
static=GlobalAI, 节点A, 节点B, 节点C, DIRECT
static=Developer, 节点A, 节点B, 节点C, DIRECT
static=Payment, 节点A, 节点B, 节点C, DIRECT
static=Game, 节点A, 节点B, 节点C, DIRECT
static=Apple, DIRECT, 节点A, 节点B
static=GlobalMedia, 节点A, 节点B, 节点C, DIRECT
static=Global, 节点A, 节点B, 节点C, DIRECT
static=PROXY, 节点A, 节点B, 节点C, DIRECT
static=AIAll, GlobalAI, DIRECT
static=GameAll, Game, DIRECT
static=Homebrew, Developer, PROXY, DIRECT
static=GitHub, Developer, PROXY, DIRECT
