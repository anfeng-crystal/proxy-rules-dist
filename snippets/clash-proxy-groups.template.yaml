    include-all-providers: true
    exclude-filter: "到期|剩余|流量|套餐|官网|网址|订阅|群组|客服|工单|更新|刷新|Traffic|Expire|Expired|Reset|Remain|Used|Total|官网|测试|Test|试用|Trial|直连|DIRECT|REJECT|广告|Ads"
