# RuleForge mihomo 完整规则配置模板。
# 适用于基于 mihomo 内核的 Clash Party 和 Clash Verge Rev；将订阅导入客户端后，可作为本地配置或 Merge 模板使用。
# rewrite/mitm 通常由客户端覆写、脚本、插件或外部模块承载，本 YAML 不混入 QuanX/Loon rewrite 语法。

mixed-port: 7890
allow-lan: false
mode: rule
log-level: warning
ipv6: true

dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 8.8.8.8
    - 1.1.1.1
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
  fake-ip-filter:
    - '*.lan'
    - 'localhost.ptlogin2.qq.com'
    - '+.wechat.com'
    - '+.weixin.qq.com'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'

sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
    TLS:
      ports: [443, 8443]

profile:
  store-selected: true
  store-fake-ip: true

proxy-providers: {}
