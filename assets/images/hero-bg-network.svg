<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 1440 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#0F766E" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="line-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#0F766E" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
    </filter>
  </defs>
  
  <rect width="1440" height="800" fill="url(#glow)"/>
  
  <!-- Subtle Grid -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <path d="M0 100h1440M0 200h1440M0 300h1440M0 400h1440M0 500h1440M0 600h1440M0 700h1440"/>
    <path d="M100 0v800M200 0v800M300 0v800M400 0v800M500 0v800M600 0v800M700 0v800M800 0v800M900 0v800M1000 0v800M1100 0v800M1200 0v800M1300 0v800"/>
  </g>

  <!-- Network Nodes & Lines -->
  <g fill="none" stroke="url(#line-glow)" stroke-width="1.5">
    <path d="M200 150 L400 300 L650 200 L900 450 L1200 250"/>
    <path d="M150 450 L350 350 L550 500 L850 300 L1150 600"/>
    <path d="M400 300 L550 500"/>
    <path d="M650 200 L850 300"/>
    <path d="M900 450 L1150 600"/>
    <path d="M150 450 L200 150"/>
  </g>
  
  <!-- Nodes Points -->
  <g fill="#14B8A6">
    <circle cx="200" cy="150" r="3"/>
    <circle cx="400" cy="300" r="4"/>
    <circle cx="650" cy="200" r="3"/>
    <circle cx="900" cy="450" r="5"/>
    <circle cx="1200" cy="250" r="2"/>
    <circle cx="150" cy="450" r="3"/>
    <circle cx="350" cy="350" r="2"/>
    <circle cx="550" cy="500" r="4"/>
    <circle cx="850" cy="300" r="3"/>
    <circle cx="1150" cy="600" r="4"/>
  </g>

  <!-- Glowing Orbs -->
  <circle cx="400" cy="300" r="40" fill="#14B8A6" fill-opacity="0.1" filter="url(#blur)"/>
  <circle cx="900" cy="450" r="60" fill="#0F766E" fill-opacity="0.15" filter="url(#blur)"/>
  <circle cx="650" cy="200" r="30" fill="#14B8A6" fill-opacity="0.1" filter="url(#blur)"/>
</svg>